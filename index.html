<!DOCTYPE html>
<html>
<head>
    <title>AntiX - Red Social Libre</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; background: #000; color: #fff; }
        textarea, input, button { width: 100%; margin: 5px 0; padding: 10px; border-radius: 8px; border: none; }
        button { background: #1d9bf0; color: white; cursor: pointer; }
        .post { background: #16181c; padding: 10px; margin: 10px 0; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>🔥AntiX</h1>
    <input type="text" id="clave" placeholder="Clave privada (déjalo vacío para crear una nueva)" style="background:#222; color:#fff;">
    <button id="conectar">Conectar / Generar cuenta</button>
    <hr>
    <textarea id="contenido" rows="3" placeholder="¿Qué estás pensando?"></textarea>
    <button id="publicar">Publicar</button>
    <div id="feed"></div>

    <script src="https://unpkg.com/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
    <script>
        let privKey = '';
        let pubKey = '';

        document.getElementById('conectar').onclick = async () => {
            const inputPriv = document.getElementById('clave').value;
            if (inputPriv) {
                privKey = inputPriv;
                pubKey = await window.nostrTools.getPublicKey(privKey);
                alert('Conectado con clave existente. Tu pubkey: ' + pubKey.slice(0,10) + '...');
            } else {
                privKey = window.nostrTools.generatePrivateKey();
                pubKey = await window.nostrTools.getPublicKey(privKey);
                alert('✅ Cuenta creada. GUARDA ESTA CLAVE PRIVADA:\n' + privKey + '\n\nSin ella no podrás recuperar tu cuenta.');
                document.getElementById('clave').value = privKey;
            }
            cargarFeed();
        };

        document.getElementById('publicar').onclick = async () => {
            if (!privKey) { alert('Primero conecta o genera cuenta'); return; }
            const contenido = document.getElementById('contenido').value;
            if (!contenido) return;

            const evento = {
                kind: 1,
                pubkey: pubKey,
                created_at: Math.floor(Date.now() / 1000),
                tags: [],
                content: contenido
            };
            evento.id = await window.nostrTools.getEventHash(evento);
            evento.sig = await window.nostrTools.signEvent(evento, privKey);

            const relays = ['wss://relay.damus.io', 'wss://nos.lol'];
            for (let relay of relays) {
                const ws = new WebSocket(relay);
                ws.onopen = () => {
                    ws.send(JSON.stringify(['EVENT', evento]));
                    ws.close();
                };
            }
            document.getElementById('contenido').value = '';
            setTimeout(cargarFeed, 2000);
        };

        async function cargarFeed() {
            const filtro = { kinds: [1], limit: 30 };
            const relays = ['wss://relay.damus.io', 'wss://nos.lol'];
            let posts = [];
            for (let relay of relays) {
                const ws = new WebSocket(relay);
                ws.onopen = () => ws.send(JSON.stringify(['REQ', 'feed', filtro]));
                ws.onmessage = (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg[0] === 'EVENT' && msg[2]?.kind === 1) posts.push(msg[2]);
                };
                await new Promise(r => setTimeout(r, 3000));
                ws.close();
            }
            posts.sort((a,b) => b.created_at - a.created_at);
            const feedDiv = document.getElementById('feed');
            feedDiv.innerHTML = posts.map(p => `<div class="post"><strong>${p.pubkey.slice(0,8)}</strong><p>${p.content}</p></div>`).join('');
        }

        cargarFeed();
    </script>
</body>
</html>
