<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AntiX - Con Imágenes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #080b0f;
            --surface: #0e1318;
            --border:  #1c2530;
            --accent:  #00d4ff;
            --accent2: #ff3cac;
            --text:    #d8e4f0;
            --muted:   #4a6070;
            --danger:  #ff4560;
            --green:   #00e676;
            --like:    #ff3cac;
            --repost:  #00e676;
            --mono:    'IBM Plex Mono', monospace;
            --sans:    'IBM Plex Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

        .app {
            display: grid;
            grid-template-columns: 220px 1fr 260px;
            grid-template-rows: 54px 1fr;
            min-height: 100vh;
            max-width: 1080px;
            margin: 0 auto;
        }

        .topbar {
            grid-column: 1/-1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 20px; gap: 12px;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: var(--mono); font-weight: 600; font-size: 1.05rem; color: var(--accent); }
        .logo span { color: var(--accent2); }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .pubkey-badge {
            font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
            background: var(--bg); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 20px; cursor: pointer;
        }
        .sidebar-left {
            border-right: 1px solid var(--border);
            padding: 16px 12px; display: flex; flex-direction: column; gap: 4px;
        }
        .nav-btn {
            background: none; border: none; color: var(--muted);
            font-family: var(--sans); font-size: 0.88rem; font-weight: 500;
            padding: 9px 12px; border-radius: 8px; cursor: pointer;
            text-align: left; display: flex; align-items: center; gap: 10px;
            width: 100%;
        }
        .nav-btn:hover { background: var(--border); color: var(--text); }
        .nav-btn.active { background: rgba(0,212,255,0.1); color: var(--accent); }
        .sidebar-divider { margin: 10px 0; padding: 10px 12px 4px; border-top: 1px solid var(--border); font-size: 0.62rem; color: var(--muted); }
        .side-key { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); padding: 4px 12px; word-break: break-all; }

        .feed-col {
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow-y: auto; max-height: calc(100vh - 54px);
        }
        .feed-header {
            padding: 12px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: var(--bg); z-index: 10;
        }
        .feed-tabs { display: flex; gap: 4px; }
        .feed-tab {
            background: none; border: 1px solid transparent; color: var(--muted);
            font-family: var(--mono); font-size: 0.68rem; padding: 5px 12px;
            border-radius: 20px; cursor: pointer;
        }
        .feed-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

        .composer {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: none; gap: 12px;
        }
        .composer-avatar {
            width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 0.6rem; font-weight: 600; color: #000;
        }
        .composer-body { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        textarea {
            background: transparent; border: none; color: var(--text);
            font-family: var(--sans); font-size: 0.92rem; resize: none; outline: none;
            width: 100%; min-height: 56px;
        }
        textarea::placeholder { color: var(--muted); }
        .composer-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
        .media-buttons { display: flex; gap: 6px; }
        .media-btn {
            background: var(--border); border: none; color: var(--muted);
            font-size: 1.1rem; padding: 6px 12px; border-radius: 20px;
            cursor: pointer; transition: all 0.15s;
        }
        .media-btn:hover { background: var(--accent); color: #000; }
        .char-count { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
        .btn {
            font-family: var(--sans); font-size: 0.8rem; font-weight: 600;
            padding: 7px 16px; border-radius: 20px; border: none; cursor: pointer;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: default; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-sm { font-size: 0.72rem; padding: 5px 12px; }

        .preview-media {
            margin-top: 8px;
            background: var(--bg);
            border-radius: 12px;
            padding: 8px;
            position: relative;
        }
        .preview-media img, .preview-media video {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
        }
        .remove-media {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
        }

        .status-bar {
            padding: 7px 18px; font-family: var(--mono); font-size: 0.68rem;
            color: var(--muted); border-bottom: 1px solid var(--border);
            min-height: 32px; display: flex; align-items: center; gap: 7px;
        }
        .status-bar.ok  { color: var(--green); }
        .status-bar.err { color: var(--danger); }
        .spinner {
            display: inline-block; width: 9px; height: 9px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .post {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: flex; gap: 11px;
            animation: fadeIn 0.25s ease;
        }
        .post:hover { background: rgba(255,255,255,0.015); }
        @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; } }

        .post-avatar {
            width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 0.6rem; font-weight: 600; color: #000;
            cursor: pointer;
        }
        .post-body { flex: 1; min-width: 0; }
        .post-meta {
            display: flex; align-items: baseline; gap: 7px;
            margin-bottom: 4px; flex-wrap: wrap;
        }
        .post-name { font-weight: 600; font-size: 0.86rem; cursor: pointer; }
        .post-name:hover { color: var(--accent); }
        .post-pubkey { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }
        .post-time { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); margin-left: auto; }
        .post-content { font-size: 0.88rem; line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
        .post-media {
            margin-top: 10px;
        }
        .post-media img, .post-media video {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
        }
        .post-actions { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
        .action-btn {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            font-family: var(--sans); font-size: 0.72rem; color: var(--muted);
            padding: 5px 10px; border-radius: 20px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.05); }
        .action-btn.like-btn.liked  { color: var(--like); }
        .action-btn.repost-btn.reposted { color: var(--repost); }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; width: 340px; max-height: 480px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .modal-close { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
        .modal-body { overflow-y: auto; padding: 8px 0; }
        .modal-user { display: flex; align-items: center; gap: 10px; padding: 10px 18px; }

        .sidebar-right { padding: 14px; overflow-y: auto; max-height: calc(100vh - 54px); }
        .widget { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
        .widget-title { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-bottom: 10px; }
        .auth-input {
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-family: var(--mono); font-size: 0.7rem;
            padding: 9px 11px; width: 100%; margin-bottom: 7px;
        }
        .empty-state { padding: 36px 18px; text-align: center; color: var(--muted); font-size: 0.82rem; }

        .av0 { background: linear-gradient(135deg,#00d4ff,#0066ff); }
        .av1 { background: linear-gradient(135deg,#ff3cac,#ff6b35); }
        .av2 { background: linear-gradient(135deg,#00e676,#00bcd4); }
        .av3 { background: linear-gradient(135deg,#ffeb3b,#ff5722); }
        .av4 { background: linear-gradient(135deg,#e040fb,#7c4dff); }
        .av5 { background: linear-gradient(135deg,#ff4560,#ff9800); }

        @media (max-width: 860px) {
            .app { grid-template-columns: 1fr; }
            .sidebar-left, .sidebar-right { display: none; }
        }
    </style>
</head>
<body>
<div class="app">

    <header class="topbar">
        <div class="logo">🔥 Anti<span>X</span></div>
        <div id="topPubkey" class="pubkey-badge" style="display:none">—</div>
        <div class="topbar-right">
            <button class="btn btn-outline btn-sm" id="btnRefresh">↺ Refrescar</button>
        </div>
    </header>

    <aside class="sidebar-left">
        <button class="nav-btn active" id="navGlobal" onclick="switchTab('global')"><span class="icon">🌐</span> Global</button>
        <button class="nav-btn" id="navSiguiendo" onclick="switchTab('siguiendo')"><span class="icon">👥</span> Siguiendo</button>
        <div class="sidebar-divider">Tu cuenta</div>
        <div class="side-key" id="sideKey">Sin conectar</div>
    </aside>

    <main class="feed-col">
        <div class="feed-header">
            <div class="feed-tabs">
                <button class="feed-tab active" id="tabGlobal" onclick="switchTab('global')">Global</button>
                <button class="feed-tab" id="tabSiguiendo" onclick="switchTab('siguiendo')">Siguiendo</button>
            </div>
            <span id="postCount" style="font-family:var(--mono);font-size:0.62rem;color:var(--muted)"></span>
        </div>

        <div class="composer" id="composer">
            <div class="composer-avatar" id="myAvatar"></div>
            <div class="composer-body">
                <textarea id="contenido" rows="3" placeholder="¿Qué estás pensando?…" maxlength="280"></textarea>
                <div class="composer-footer">
                    <div class="media-buttons">
                        <button class="media-btn" id="btnImagen" title="Subir imagen">📷 Imagen</button>
                        <button class="media-btn" id="btnVideo" title="Subir video">🎬 Video</button>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <span class="char-count" id="charCount">280</span>
                        <button class="btn btn-primary btn-sm" id="btnPublicar" disabled>Publicar</button>
                    </div>
                </div>
                <div id="previewContainer" style="display:none;" class="preview-media">
                    <button class="remove-media" id="removeMedia">✕</button>
                    <div id="previewContent"></div>
                </div>
            </div>
        </div>

        <div class="status-bar" id="statusBar">Conecta tu cuenta para empezar</div>
        <div id="feed"></div>
    </main>

    <aside class="sidebar-right">
        <div class="widget">
            <div class="widget-title">🔑 Cuenta</div>
            <input class="auth-input" type="password" id="claveInput" placeholder="Clave privada (vacío = nueva)">
            <button class="btn btn-primary" style="width:100%" id="btnConectar">Conectar</button>
        </div>
    </aside>
</div>

<div class="modal-overlay" id="likesModal" onclick="closeLikesModal(event)">
    <div class="modal">
        <div class="modal-header"><span id="modalTitle">❤️ Likes</span><button class="modal-close" onclick="closeLikesModal()">✕</button></div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
<script>
// ========== ESTADO ==========
let privKey    = '';
let pubKey     = '';
let follows    = new Set();
let profiles   = new Map();
let feedPosts  = new Map();
let likes      = new Map();
let myLikes    = new Set();
let reposts    = new Map();
let myReposts  = new Set();
let currentTab = 'global';

let pendingMedia = null;   // { url, type }
let pendingMime   = '';

const RELAYS = ['wss://relay.damus.io', 'wss://nos.lol', 'wss://relay.nostr.band'];

// Servidores Blossom públicos
const BLOSSOM_SERVERS = [
    'https://blossom.slothy.win',
    'https://cdn.hzrd149.com',
    'https://nostrcheck.me'
];

// ========== UTILS ==========
const $ = id => document.getElementById(id);

function setStatus(msg, type='') {
    const el = $('statusBar');
    el.innerHTML = msg;
    el.className = 'status-bar ' + type;
}

function avClass(pk) { return 'av' + (parseInt(pk.slice(0,4),16) % 6); }
function avInitials(pk) {
    const p = profiles.get(pk);
    if (p?.name) return p.name.slice(0,2).toUpperCase();
    return pk.slice(0,2).toUpperCase();
}
function displayName(pk) {
    const p = profiles.get(pk);
    return p?.name ? p.name : pk.slice(0,8)+'…';
}
function timeAgo(ts) {
    const d = Math.floor(Date.now()/1000) - ts;
    if (d < 60) return d+'s';
    if (d < 3600) return Math.floor(d/60)+'m';
    if (d < 86400) return Math.floor(d/3600)+'h';
    return Math.floor(d/86400)+'d';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ========== SUBIR IMAGEN/VIDEO A BLOSSOM ==========
async function uploadToBlossom(file) {
    setStatus('<span class="spinner"></span> Subiendo archivo...');
    
    // Verificar tamaño (10MB máximo)
    if (file.size > 10 * 1024 * 1024) {
        throw new Error('El archivo es muy grande (máx 10MB)');
    }

    // Verificar tipo
    if (!file.type.startsWith('image/') && !file.type.startsWith('video/')) {
        throw new Error('Solo se permiten imágenes o videos');
    }

    pendingMime = file.type;

    // Intentar subir a cada servidor
    for (const server of BLOSSOM_SERVERS) {
        try {
            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch(server + '/upload', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                const data = await res.json();
                const url = data.url || (server + '/' + data.sha256);
                setStatus('✅ Archivo subido', 'ok');
                return url;
            }
        } catch(e) {
            console.log(`Falló ${server}:`, e);
            continue;
        }
    }
    throw new Error('No se pudo subir a ningún servidor');
}

// ========== SUBIR ARCHIVO ==========
async function handleMediaUpload(type) {
    if (!privKey) {
        alert('Primero conecta tu cuenta');
        return;
    }

    const input = document.createElement('input');
    input.type = 'file';
    input.accept = type === 'image' ? 'image/*' : 'video/*';
    
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        try {
            const url = await uploadToBlossom(file);
            pendingMedia = { url, type: file.type };
            
            // Mostrar preview
            const previewDiv = $('previewContent');
            if (file.type.startsWith('image/')) {
                previewDiv.innerHTML = `<img src="${url}" alt="Preview">`;
            } else {
                previewDiv.innerHTML = `<video src="${url}" controls></video>`;
            }
            $('previewContainer').style.display = 'block';
            
        } catch(err) {
            alert('Error: ' + err.message);
            setStatus('❌ ' + err.message, 'err');
        }
    };
    input.click();
}

$('btnImagen').onclick = () => handleMediaUpload('image');
$('btnVideo').onclick = () => handleMediaUpload('video');

$('removeMedia').onclick = () => {
    pendingMedia = null;
    pendingMime = '';
    $('previewContainer').style.display = 'none';
    $('previewContent').innerHTML = '';
};

// ========== RELAY HELPERS ==========
function openRelay(url, timeout=5000) {
    return new Promise((resolve, reject) => {
        try {
            const ws = new WebSocket(url);
            const t = setTimeout(() => reject(new Error('timeout')), timeout);
            ws.onopen  = () => { clearTimeout(t); resolve(ws); };
            ws.onerror = () => { clearTimeout(t); reject(); };
        } catch(e) { reject(e); }
    });
}

async function queryRelay(url, filters, onEvent, timeout=7000) {
    let ws;
    try {
        ws = await openRelay(url, 5000);
        const sub = 'sub_' + Math.random().toString(36).slice(2,7);
        ws.send(JSON.stringify(['REQ', sub, ...filters]));
        await new Promise(resolve => {
            const t = setTimeout(resolve, timeout);
            ws.onmessage = e => {
                try {
                    const m = JSON.parse(e.data);
                    if (m[0]==='EVENT' && m[2]) onEvent(m[2]);
                    if (m[0]==='EOSE') { clearTimeout(t); resolve(); }
                } catch(_) {}
            };
            ws.onerror = () => { clearTimeout(t); resolve(); };
        });
    } catch(_) {}
    try { ws?.close(); } catch(_) {}
}

async function publishEvent(event) {
    let ok = 0;
    await Promise.all(RELAYS.map(async url => {
        try {
            const ws = await openRelay(url, 5000);
            ws.send(JSON.stringify(['EVENT', event]));
            await new Promise(r => setTimeout(r, 900));
            ws.close();
            ok++;
        } catch(_) {}
    }));
    return ok;
}

// ========== PERFILES ==========
async function loadProfiles(pubkeys) {
    const missing = [...new Set(pubkeys)].filter(pk => !profiles.has(pk));
    if (!missing.length) return;
    const filter = { kinds:[0], authors: missing, limit: missing.length };
    await Promise.all(RELAYS.map(url =>
        queryRelay(url, [filter], ev => {
            if (ev.kind===0 && !profiles.has(ev.pubkey)) {
                try { profiles.set(ev.pubkey, JSON.parse(ev.content)); } catch(_) {}
            }
        }, 4000)
    ));
}

// ========== FOLLOWS ==========
async function loadFollows() {
    if (!pubKey) return;
    await Promise.all(RELAYS.map(url =>
        queryRelay(url, [{ kinds:[3], authors:[pubKey], limit:1 }], ev => {
            if (ev.kind===3 && ev.pubkey===pubKey)
                ev.tags.filter(t=>t[0]==='p').forEach(t=>follows.add(t[1]));
        }, 4000)
    ));
}

async function publishFollows() {
    const ev = window.NostrTools.finishEvent({
        kind:3, created_at: Math.floor(Date.now()/1000),
        tags: [...follows].map(pk=>['p',pk]), content:''
    }, privKey);
    await publishEvent(ev);
}

async function followUser(pk) {
    if (!privKey || follows.has(pk) || pk===pubKey) return;
    follows.add(pk);
    await publishFollows();
    renderFeed();
}
async function unfollowUser(pk) {
    if (!privKey) return;
    follows.delete(pk);
    await publishFollows();
    renderFeed();
}

// ========== LIKES ==========
async function loadLikes(postIds) {
    if (!postIds.length) return;
    const filter = { kinds:[7], '#e': postIds, limit: 500 };
    await Promise.all(RELAYS.map(url =>
        queryRelay(url, [filter], ev => {
            if (ev.kind!==7) return;
            const eTag = ev.tags.find(t=>t[0]==='e');
            if (!eTag) return;
            const pid = eTag[1];
            if (!likes.has(pid)) likes.set(pid, new Set());
            likes.get(pid).add(ev.pubkey);
            if (pubKey && ev.pubkey===pubKey) myLikes.add(pid);
        }, 5000)
    ));
}

async function likePost(postId) {
    if (!privKey || myLikes.has(postId)) return;
    const post = feedPosts.get(postId);
    const tags = [['e', postId]];
    if (post) tags.push(['p', post.pubkey]);
    const ev = window.NostrTools.finishEvent({
        kind:7, created_at: Math.floor(Date.now()/1000),
        tags, content: '+'
    }, privKey);
    myLikes.add(postId);
    if (!likes.has(postId)) likes.set(postId, new Set());
    likes.get(postId).add(pubKey);
    await publishEvent(ev);
    updatePostActions(postId);
}

// ========== REPOSTS ==========
async function loadReposts(postIds) {
    if (!postIds.length) return;
    const filter = { kinds:[6], '#e': postIds, limit: 300 };
    await Promise.all(RELAYS.map(url =>
        queryRelay(url, [filter], ev => {
            if (ev.kind!==6) return;
            const eTag = ev.tags.find(t=>t[0]==='e');
            if (!eTag) return;
            const pid = eTag[1];
            if (!reposts.has(pid)) reposts.set(pid, new Set());
            reposts.get(pid).add(ev.pubkey);
            if (pubKey && ev.pubkey===pubKey) myReposts.add(pid);
        }, 5000)
    ));
}

async function repostPost(postId) {
    if (!privKey || myReposts.has(postId)) return;
    const post = feedPosts.get(postId);
    const tags = [['e', postId]];
    if (post) tags.push(['p', post.pubkey]);
    const ev = window.NostrTools.finishEvent({
        kind:6, created_at: Math.floor(Date.now()/1000),
        tags, content: post ? JSON.stringify(post) : ''
    }, privKey);
    myReposts.add(postId);
    if (!reposts.has(postId)) reposts.set(postId, new Set());
    reposts.get(postId).add(pubKey);
    await publishEvent(ev);
    updatePostActions(postId);
}

function updatePostActions(postId) {
    const el = document.querySelector(`[data-post-id="${postId}"] .post-actions`);
    if (el) el.innerHTML = buildActions(feedPosts.get(postId));
}

// ========== MODAL ==========
async function showLikes(postId) {
    const modal = $('likesModal');
    const body  = $('modalBody');
    const title = $('modalTitle');
    const likers = [...(likes.get(postId) || [])];
    title.textContent = `❤️ ${likers.length} Like${likers.length!==1?'s':''}`;
    body.innerHTML = `<div style="padding:14px;"><span class="spinner"></span> Cargando…</div>`;
    modal.classList.add('open');
    await loadProfiles(likers);
    if (!likers.length) {
        body.innerHTML = `<div class="empty-state">Sin likes aún</div>`;
        return;
    }
    body.innerHTML = likers.map(pk => `<div class="modal-user"><div class="modal-avatar ${avClass(pk)}">${avInitials(pk)}</div><div><div class="modal-name">${displayName(pk)}</div><div class="modal-key">${pk.slice(0,14)}…</div></div></div>`).join('');
}
function closeLikesModal(e) { if (!e || e.target === $('likesModal')) $('likesModal').classList.remove('open'); }

// ========== RENDER ==========
function getMediaHtml(tags) {
    if (!tags) return '';
    for (const tag of tags) {
        if (tag[0] === 'imeta' && tag[1] === 'url') {
            const url = tag[2];
            if (url.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                return `<div class="post-media"><img src="${url}" loading="lazy"></div>`;
            } else if (url.match(/\.(mp4|webm|mov)$/i)) {
                return `<div class="post-media"><video src="${url}" controls></video></div>`;
            }
        }
    }
    // También buscar URL directa en el contenido (fallback)
    if (tags && tags[0]?.startsWith('http') && (tags[0].match(/\.(jpg|png|gif|mp4)/i))) {
        const url = tags[0];
        if (url.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
            return `<div class="post-media"><img src="${url}" loading="lazy"></div>`;
        } else if (url.match(/\.(mp4|webm|mov)$/i)) {
            return `<div class="post-media"><video src="${url}" controls></video></div>`;
        }
    }
    return '';
}

function buildActions(post) {
    const id = post.id;
    const isMe = post.pubkey === pubKey;
    const isFollowing = follows.has(post.pubkey);
    const liked = myLikes.has(id);
    const reposted = myReposts.has(id);
    const likeCount = likes.get(id)?.size || 0;
    const repostCount = reposts.get(id)?.size || 0;

    const likeBtn = `<button class="action-btn like-btn ${liked?'liked':''}" onclick="likePost('${id}')">${liked?'❤️':'🤍'}${likeCount?likeCount:''}</button>`;
    const likersBtn = likeCount ? `<button class="action-btn" onclick="showLikes('${id}')" style="color:var(--like);">Ver likes</button>` : '';
    const repostBtn = `<button class="action-btn repost-btn ${reposted?'reposted':''}" onclick="repostPost('${id}')">🔁${repostCount?repostCount:''}</button>`;
    let followBtn = '';
    if (privKey && !isMe) {
        followBtn = isFollowing 
            ? `<button class="action-btn follow-btn following" onclick="unfollowUser('${post.pubkey}')">✓ Siguiendo</button>`
            : `<button class="action-btn follow-btn" onclick="followUser('${post.pubkey}')">+ Seguir</button>`;
    }
    return likeBtn + likersBtn + repostBtn + followBtn;
}

function renderPost(post) {
    const id = post.id;
    const mediaHtml = getMediaHtml(post.tags);
    return `<div class="post" data-post-id="${id}">
        <div class="post-avatar ${avClass(post.pubkey)}">${avInitials(post.pubkey)}</div>
        <div class="post-body">
            <div class="post-meta">
                <span class="post-name">${esc(displayName(post.pubkey))}</span>
                <span class="post-pubkey">${post.pubkey.slice(0,8)}…</span>
                <span class="post-time">${timeAgo(post.created_at)}</span>
            </div>
            <div class="post-content">${esc(post.content)}</div>
            ${mediaHtml}
            <div class="post-actions">${buildActions(post)}</div>
        </div>
    </div>`;
}

function renderFeed() {
    let posts = [...feedPosts.values()];
    if (currentTab === 'siguiendo') {
        posts = posts.filter(p => follows.has(p.pubkey) || p.pubkey === pubKey);
    }
    posts.sort((a,b) => b.created_at - a.created_at);
    $('postCount').textContent = posts.length + ' posts';
    if (!posts.length) {
        $('feed').innerHTML = `<div class="empty-state">${currentTab==='siguiendo' ? 'Sin posts de tus seguidos' : 'Sin posts'}</div>`;
        return;
    }
    $('feed').innerHTML = posts.map(p => renderPost(p)).join('');
}

// ========== CARGA FEED ==========
async function loadFeed() {
    setStatus('<span class="spinner"></span> Cargando feed…');
    feedPosts.clear();
    const filter = currentTab==='global'
        ? { kinds:[1], limit:40 }
        : { kinds:[1], authors:[...(pubKey?[pubKey]:[]), ...follows], limit:60 };
    await Promise.all(RELAYS.map(url => queryRelay(url, [filter], ev => { if (ev.kind===1) feedPosts.set(ev.id, ev); }, 7000)));
    const postIds = [...feedPosts.keys()];
    const authors = [...new Set([...feedPosts.values()].map(p=>p.pubkey))];
    await Promise.all([loadProfiles(authors), loadLikes(postIds), loadReposts(postIds)]);
    setStatus(`✓ ${feedPosts.size} posts`, 'ok');
    renderFeed();
}

// ========== PUBLICAR ==========
$('btnPublicar').onclick = async () => {
    if (!privKey) return;
    const text = $('contenido').value.trim();
    if (!text && !pendingMedia) return;
    $('btnPublicar').disabled = true;
    setStatus('<span class="spinner"></span> Publicando…');
    try {
        const tags = [];
        if (pendingMedia) {
            tags.push(['imeta', 'url', pendingMedia.url]);
            tags.push(['m', pendingMime]);
        }
        const ev = window.NostrTools.finishEvent({
            kind:1, created_at: Math.floor(Date.now()/1000),
            tags: tags, content: text || ''
        }, privKey);
        await publishEvent(ev);
        $('contenido').value = '';
        $('charCount').textContent = '280';
        pendingMedia = null;
        $('previewContainer').style.display = 'none';
        $('previewContent').innerHTML = '';
        await loadFeed();
        setStatus('✅ Publicado', 'ok');
    } catch(err) {
        setStatus('❌ '+err.message, 'err');
    } finally {
        $('btnPublicar').disabled = false;
    }
};

$('contenido').oninput = function() {
    const left = 280 - this.value.length;
    $('charCount').textContent = left;
    $('btnPublicar').disabled = !this.value.trim() && !pendingMedia;
};

// ========== AUTH ==========
$('btnConectar').onclick = async () => {
    const nt = window.NostrTools;
    if (!nt) { setStatus('❌ nostr-tools no cargó','err'); return; }
    $('btnConectar').disabled = true;
    setStatus('<span class="spinner"></span> Conectando…');
    try {
        const input = $('claveInput').value.trim();
        if (input) {
            privKey = input;
            pubKey = nt.getPublicKey(privKey);
        } else {
            privKey = nt.generatePrivateKey();
            pubKey = nt.getPublicKey(privKey);
            $('claveInput').value = privKey;
            alert('✅ CUENTA CREADA\n\nGuarda esta clave:\n' + privKey);
        }
        $('topPubkey').textContent = pubKey.slice(0,10)+'…';
        $('topPubkey').style.display = 'block';
        $('sideKey').textContent = pubKey;
        $('composer').style.display = 'flex';
        $('myAvatar').className = 'composer-avatar ' + avClass(pubKey);
        $('myAvatar').textContent = pubKey.slice(0,2).toUpperCase();
        await loadFollows();
        await loadFeed();
        setStatus('✅ Conectado','ok');
    } catch(err) {
        setStatus('❌ '+err.message,'err');
    } finally {
        $('btnConectar').disabled = false;
    }
};

$('btnRefresh').onclick = loadFeed;

function switchTab(tab) {
    currentTab = tab;
    ['global','siguiendo'].forEach(t => {
        const cap = t[0].toUpperCase() + t.slice(1);
        $(`tab${cap}`)?.classList.toggle('active', t===tab);
        $(`nav${cap}`)?.classList.toggle('active', t===tab);
    });
    loadFeed();
}

// Inicializar
loadFeed();
</script>
