<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AntiX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #080b0f;
            --surface:  #0e1318;
            --border:   #1c2530;
            --accent:   #00d4ff;
            --accent2:  #ff3cac;
            --text:     #d8e4f0;
            --muted:    #4a6070;
            --danger:   #ff4560;
            --green:    #00e676;
            --mono:     'IBM Plex Mono', monospace;
            --sans:     'IBM Plex Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Layout ── */
        .app {
            display: grid;
            grid-template-columns: 240px 1fr 280px;
            grid-template-rows: 56px 1fr;
            min-height: 100vh;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── Topbar ── */
        .topbar {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: var(--mono);
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent);
            letter-spacing: -0.02em;
        }
        .logo span { color: var(--accent2); }
        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .pubkey-badge {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .pubkey-badge:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Sidebar izquierda ── */
        .sidebar-left {
            border-right: 1px solid var(--border);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-family: var(--sans);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
            width: 100%;
        }
        .nav-btn:hover { background: var(--border); color: var(--text); }
        .nav-btn.active { background: rgba(0,212,255,0.1); color: var(--accent); }
        .nav-btn .icon { font-size: 1.1rem; width: 20px; text-align: center; }

        .sidebar-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        /* ── Feed principal ── */
        .feed-col {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: calc(100vh - 56px);
        }
        .feed-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }
        .feed-tabs {
            display: flex;
            gap: 4px;
        }
        .feed-tab {
            background: none;
            border: 1px solid transparent;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .feed-tab.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,212,255,0.08);
        }
        .feed-tab:hover:not(.active) { border-color: var(--border); color: var(--text); }

        .composer {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        .composer-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: #000;
            font-weight: 600;
        }
        .composer-body { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            width: 100%;
            min-height: 60px;
            placeholder-color: var(--muted);
        }
        textarea::placeholder { color: var(--muted); }
        .composer-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }
        .char-count {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
        }
        .char-count.warn { color: #ff9800; }
        .char-count.over { color: var(--danger); }

        /* ── Botones ── */
        .btn {
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.01em;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover { background: #33ddff; transform: translateY(-1px); }
        .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: default; transform: none; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm {
            font-size: 0.72rem;
            padding: 5px 12px;
        }

        /* ── Posts ── */
        .post {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            cursor: default;
            transition: background 0.1s;
            animation: fadeIn 0.3s ease;
        }
        .post:hover { background: rgba(255,255,255,0.015); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

        .post-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.62rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
        }
        .post-body { flex: 1; min-width: 0; }
        .post-meta {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .post-name {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text);
            cursor: pointer;
        }
        .post-name:hover { color: var(--accent); }
        .post-pubkey {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--muted);
        }
        .post-time {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            margin-left: auto;
        }
        .post-content {
            font-size: 0.9rem;
            line-height: 1.55;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .post-actions {
            display: flex;
            gap: 16px;
            margin-top: 10px;
        }
        .post-action {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 0;
            transition: color 0.15s;
            font-family: var(--sans);
        }
        .post-action:hover { color: var(--accent); }
        .post-action.following { color: var(--green); }
        .post-action.unfollow:hover { color: var(--danger); }

        /* ── Sidebar derecha ── */
        .sidebar-right {
            padding: 16px;
            overflow-y: auto;
            max-height: calc(100vh - 56px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .widget {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .widget-title {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        /* ── Auth panel ── */
        .auth-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .auth-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.72rem;
            padding: 10px 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-input:focus { border-color: var(--accent); }
        .auth-input::placeholder { color: var(--muted); }

        /* ── Follows list ── */
        .follow-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .follow-item:last-child { border-bottom: none; }
        .follow-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.58rem;
            font-weight: 600;
            color: #000;
        }
        .follow-info { flex: 1; min-width: 0; }
        .follow-name {
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .follow-key {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--muted);
        }
        .unfollow-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--muted);
            font-size: 0.65rem;
            padding: 3px 8px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--sans);
        }
        .unfollow-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Status / loader ── */
        .status-bar {
            padding: 8px 20px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-bar.ok { color: var(--green); }
        .status-bar.err { color: var(--danger); }

        .spinner {
            display: inline-block;
            width: 10px; height: 10px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            font-family: var(--mono);
        }

        /* colores avatar deterministicos */
        .av0 { background: linear-gradient(135deg,#00d4ff,#0066ff); }
        .av1 { background: linear-gradient(135deg,#ff3cac,#ff6b35); }
        .av2 { background: linear-gradient(135deg,#00e676,#00bcd4); }
        .av3 { background: linear-gradient(135deg,#ffeb3b,#ff5722); }
        .av4 { background: linear-gradient(135deg,#e040fb,#7c4dff); }
        .av5 { background: linear-gradient(135deg,#ff4560,#ff9800); }

        @media (max-width: 900px) {
            .app { grid-template-columns: 1fr; grid-template-rows: auto; }
            .sidebar-left, .sidebar-right { display: none; }
            .feed-col { max-height: none; border-right: none; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- Topbar -->
    <header class="topbar">
        <div class="logo">🔥 Anti<span>X</span></div>
        <div id="topPubkey" class="pubkey-badge" style="display:none" title="Click para copiar">—</div>
        <div class="topbar-right">
            <button class="btn btn-outline btn-sm" id="btnRefresh" title="Refrescar feed">↺ Refrescar</button>
        </div>
    </header>

    <!-- Sidebar izquierda -->
    <aside class="sidebar-left">
        <button class="nav-btn active" id="navGlobal" onclick="switchTab('global')">
            <span class="icon">🌐</span> Global
        </button>
        <button class="nav-btn" id="navSiguiendo" onclick="switchTab('siguiendo')">
            <span class="icon">👥</span> Siguiendo
        </button>

        <div class="sidebar-section">Tu cuenta</div>
        <div style="font-family:var(--mono);font-size:0.68rem;color:var(--muted);padding:4px 14px;word-break:break-all;line-height:1.5;" id="sideKey">Sin conectar</div>
    </aside>

    <!-- Feed -->
    <main class="feed-col" id="feedCol">
        <div class="feed-header">
            <div class="feed-tabs">
                <button class="feed-tab active" id="tabGlobal" onclick="switchTab('global')">Global</button>
                <button class="feed-tab" id="tabSiguiendo" onclick="switchTab('siguiendo')">Siguiendo</button>
            </div>
            <span id="postCount" style="font-size:0.65rem;color:var(--muted)"></span>
        </div>

        <!-- Composer -->
        <div class="composer" id="composer" style="display:none">
            <div class="post-avatar av0" id="myAvatar" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.62rem;font-weight:600;color:#000;flex-shrink:0;"></div>
            <div class="composer-body">
                <textarea id="contenido" rows="3" placeholder="¿Qué estás pensando?..." maxlength="280"></textarea>
                <div class="composer-footer">
                    <span class="char-count" id="charCount">280</span>
                    <button class="btn btn-primary btn-sm" id="btnPublicar" disabled>Publicar</button>
                </div>
            </div>
        </div>

        <div class="status-bar" id="statusBar">Conecta tu cuenta para empezar</div>
        <div id="feed"></div>
    </main>

    <!-- Sidebar derecha -->
    <aside class="sidebar-right">

        <!-- Auth -->
        <div class="widget">
            <div class="widget-title">🔑 Cuenta</div>
            <div class="auth-panel">
                <input class="auth-input" type="password" id="claveInput" placeholder="Clave privada hex (vacío = nueva)">
                <button class="btn btn-primary" id="btnConectar">Conectar</button>
            </div>
        </div>

        <!-- Siguiendo -->
        <div class="widget" id="widgetFollows" style="display:none">
            <div class="widget-title">👥 Siguiendo (<span id="followCount">0</span>)</div>
            <div id="followsList"></div>
        </div>

    </aside>

</div>

<script src="https://cdn.jsdelivr.net/npm/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ═══════════════════════════════════════════════════════
let privKey   = '';
let pubKey    = '';
let follows   = new Set();    // pubkeys que sigo
let profiles  = new Map();    // pubkey → {name, picture}
let feedPosts = new Map();    // id → evento
let currentTab = 'global';

const RELAYS = ['wss://relay.damus.io', 'wss://nos.lol', 'wss://relay.nostr.band'];

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

function setStatus(msg, type = '') {
    const bar = $('statusBar');
    bar.innerHTML = msg;
    bar.className = 'status-bar ' + type;
}

function avatarClass(pubkey) {
    const n = parseInt(pubkey.slice(0,4), 16) % 6;
    return 'av' + n;
}

function avatarInitials(pubkey, profile) {
    if (profile?.name) return profile.name.slice(0,2).toUpperCase();
    return pubkey.slice(0,2).toUpperCase();
}

function displayName(pubkey) {
    const p = profiles.get(pubkey);
    if (p?.name) return p.name;
    return pubkey.slice(0,8) + '…';
}

function timeAgo(ts) {
    const diff = Math.floor(Date.now()/1000) - ts;
    if (diff < 60)   return diff + 's';
    if (diff < 3600) return Math.floor(diff/60) + 'm';
    if (diff < 86400) return Math.floor(diff/3600) + 'h';
    return Math.floor(diff/86400) + 'd';
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════
//  WEBSOCKET HELPERS
// ═══════════════════════════════════════════════════════
function openRelay(url, timeout = 6000) {
    return new Promise((resolve, reject) => {
        try {
            const ws = new WebSocket(url);
            const t = setTimeout(() => reject(new Error('timeout')), timeout);
            ws.onopen  = () => { clearTimeout(t); resolve(ws); };
            ws.onerror = () => { clearTimeout(t); reject(new Error('error')); };
        } catch(e) { reject(e); }
    });
}

async function queryRelay(url, filters, onEvent, timeout = 7000) {
    let ws;
    try {
        ws = await openRelay(url, 5000);
        const subId = Math.random().toString(36).slice(2,8);
        ws.send(JSON.stringify(['REQ', subId, ...filters]));
        await new Promise(resolve => {
            const t = setTimeout(resolve, timeout);
            ws.onmessage = e => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg[0] === 'EVENT' && msg[2]) onEvent(msg[2]);
                    if (msg[0] === 'EOSE') { clearTimeout(t); resolve(); }
                } catch(_) {}
            };
            ws.onerror = () => { clearTimeout(t); resolve(); };
        });
    } catch(_) {}
    try { ws?.close(); } catch(_) {}
}

async function publishToRelays(event) {
    let ok = 0;
    const promises = RELAYS.map(async url => {
        try {
            const ws = await openRelay(url, 5000);
            ws.send(JSON.stringify(['EVENT', event]));
            await new Promise(r => setTimeout(r, 1000));
            ws.close();
            ok++;
        } catch(_) {}
    });
    await Promise.all(promises);
    return ok;
}

// ═══════════════════════════════════════════════════════
//  PERFILES
// ═══════════════════════════════════════════════════════
async function loadProfiles(pubkeys) {
    if (!pubkeys.length) return;
    const missing = pubkeys.filter(pk => !profiles.has(pk));
    if (!missing.length) return;

    const filter = { kinds: [0], authors: missing, limit: missing.length };

    const promises = RELAYS.map(url =>
        queryRelay(url, [filter], ev => {
            if (ev.kind === 0) {
                try {
                    const meta = JSON.parse(ev.content);
                    if (!profiles.has(ev.pubkey)) {
                        profiles.set(ev.pubkey, { name: meta.name || meta.display_name, picture: meta.picture });
                    }
                } catch(_) {}
            }
        }, 4000)
    );
    await Promise.all(promises);
}

// ═══════════════════════════════════════════════════════
//  FOLLOWS (kind:3)
// ═══════════════════════════════════════════════════════
async function loadFollows() {
    if (!pubKey) return;
    const filter = { kinds: [3], authors: [pubKey], limit: 1 };
    const promises = RELAYS.map(url =>
        queryRelay(url, [filter], ev => {
            if (ev.kind === 3 && ev.pubkey === pubKey) {
                ev.tags.filter(t => t[0]==='p').forEach(t => follows.add(t[1]));
            }
        }, 4000)
    );
    await Promise.all(promises);
    renderFollowsList();
}

async function publishFollows() {
    const nt = window.NostrTools;
    const event = nt.finishEvent({
        kind: 3,
        created_at: Math.floor(Date.now()/1000),
        tags: [...follows].map(pk => ['p', pk]),
        content: ''
    }, privKey);
    await publishToRelays(event);
}

async function followUser(targetPubkey) {
    if (!privKey) return;
    if (follows.has(targetPubkey)) return;
    follows.add(targetPubkey);
    await publishFollows();
    renderFollowsList();
    renderFeed();
}

async function unfollowUser(targetPubkey) {
    if (!privKey) return;
    follows.delete(targetPubkey);
    await publishFollows();
    renderFollowsList();
    renderFeed();
}

function renderFollowsList() {
    $('followCount').textContent = follows.size;
    $('widgetFollows').style.display = follows.size ? 'block' : 'none';

    const list = $('followsList');
    if (!follows.size) { list.innerHTML = ''; return; }

    list.innerHTML = [...follows].map(pk => {
        const p  = profiles.get(pk);
        const ac = avatarClass(pk);
        const nm = p?.name ? escapeHtml(p.name) : pk.slice(0,10)+'…';
        return `<div class="follow-item">
            <div class="follow-avatar ${ac}">${avatarInitials(pk,p)}</div>
            <div class="follow-info">
                <div class="follow-name">${nm}</div>
                <div class="follow-key">${pk.slice(0,10)}…</div>
            </div>
            <button class="unfollow-btn" onclick="unfollowUser('${pk}')">Dejar</button>
        </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════════════
//  FEED
// ═══════════════════════════════════════════════════════
async function loadFeed() {
    setStatus('<span class="spinner"></span> Cargando feed…');
    feedPosts.clear();

    const filter = currentTab === 'global'
        ? { kinds: [1], limit: 40 }
        : { kinds: [1], authors: [...follows, pubKey], limit: 60 };

    if (currentTab === 'siguiendo' && !follows.size && !pubKey) {
        setStatus('Sigue a alguien para ver su feed', '');
        $('feed').innerHTML = `<div class="empty-state">Aún no sigues a nadie.<br>Cambia al feed Global y empieza a seguir.</div>`;
        return;
    }

    const promises = RELAYS.map(url =>
        queryRelay(url, [filter], ev => {
            if (ev.kind === 1) feedPosts.set(ev.id, ev);
        }, 7000)
    );
    await Promise.all(promises);

    // Cargar perfiles de los autores
    const authors = [...new Set([...feedPosts.values()].map(p => p.pubkey))];
    await loadProfiles(authors);

    const count = feedPosts.size;
    setStatus(`✓ ${count} posts`, 'ok');
    $('postCount').textContent = count + ' posts';
    renderFeed();
}

function renderFeed() {
    const posts = [...feedPosts.values()]
        .filter(p => {
            if (currentTab === 'siguiendo') return follows.has(p.pubkey) || p.pubkey === pubKey;
            return true;
        })
        .sort((a,b) => b.created_at - a.created_at);

    if (!posts.length) {
        $('feed').innerHTML = `<div class="empty-state">${currentTab === 'siguiendo' ? 'Sin posts de tus seguidos aún.' : 'Sin posts.'}</div>`;
        return;
    }

    $('feed').innerHTML = posts.map(p => renderPost(p)).join('');
}

function renderPost(p) {
    const profile   = profiles.get(p.pubkey);
    const ac        = avatarClass(p.pubkey);
    const initials  = avatarInitials(p.pubkey, profile);
    const name      = escapeHtml(displayName(p.pubkey));
    const content   = escapeHtml(p.content);
    const ago       = timeAgo(p.created_at);
    const isMe      = p.pubkey === pubKey;
    const isFollowing = follows.has(p.pubkey);

    let actionBtn = '';
    if (privKey && !isMe) {
        if (isFollowing) {
            actionBtn = `<button class="post-action following unfollow" onclick="unfollowUser('${p.pubkey}')">✓ Siguiendo</button>`;
        } else {
            actionBtn = `<button class="post-action" onclick="followUser('${p.pubkey}')">+ Seguir</button>`;
        }
    }

    return `<div class="post">
        <div class="post-avatar ${ac}" title="${p.pubkey}">${initials}</div>
        <div class="post-body">
            <div class="post-meta">
                <span class="post-name">${name}</span>
                <span class="post-pubkey">${p.pubkey.slice(0,8)}…</span>
                <span class="post-time">${ago}</span>
            </div>
            <div class="post-content">${content}</div>
            <div class="post-actions">${actionBtn}</div>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
    currentTab = tab;
    ['global','siguiendo'].forEach(t => {
        $('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
        $('nav'  + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
    });
    loadFeed();
}

// ═══════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════
$('btnConectar').onclick = async () => {
    const nt = window.NostrTools;
    if (!nt) { setStatus('❌ nostr-tools no cargó', 'err'); return; }

    $('btnConectar').disabled = true;
    setStatus('<span class="spinner"></span> Conectando…');

    try {
        const input = $('claveInput').value.trim();
        if (input) {
            privKey = input;
            pubKey  = nt.getPublicKey(privKey);
            setStatus('✅ Conectado', 'ok');
        } else {
            privKey = nt.generatePrivateKey();
            pubKey  = nt.getPublicKey(privKey);
            $('claveInput').value = privKey;
            alert('✅ CUENTA CREADA\n\nGuarda esta clave privada:\n' + privKey + '\n\nSin ella perderás el acceso.');
            setStatus('✅ Cuenta nueva creada', 'ok');
        }

        // UI
        const short = pubKey.slice(0,10) + '…';
        $('topPubkey').textContent = short;
        $('topPubkey').style.display = 'block';
        $('sideKey').textContent    = pubKey;
        $('composer').style.display = 'flex';
        $('btnPublicar').disabled   = false;
        $('myAvatar').className     = 'post-avatar ' + avatarClass(pubKey);
        $('myAvatar').textContent   = pubKey.slice(0,2).toUpperCase();

        // Copiar pubkey al hacer click
        $('topPubkey').onclick = () => {
            navigator.clipboard.writeText(pubKey).then(() => {
                $('topPubkey').textContent = '¡Copiado!';
                setTimeout(() => $('topPubkey').textContent = short, 1500);
            });
        };

        // Cargar follows y feed
        await loadFollows();
        await loadFeed();

    } catch(err) {
        setStatus('❌ ' + err.message, 'err');
    } finally {
        $('btnConectar').disabled = false;
    }
};

// ═══════════════════════════════════════════════════════
//  PUBLICAR
// ═══════════════════════════════════════════════════════
$('contenido').oninput = function() {
    const left = 280 - this.value.length;
    const cc   = $('charCount');
    cc.textContent = left;
    cc.className = left < 20 ? 'char-count over' : left < 50 ? 'char-count warn' : 'char-count';
    $('btnPublicar').disabled = !this.value.trim() || left < 0;
};

$('btnPublicar').onclick = async () => {
    if (!privKey) return;
    const text = $('contenido').value.trim();
    if (!text) return;

    $('btnPublicar').disabled = true;
    setStatus('<span class="spinner"></span> Publicando…');

    try {
        const nt = window.NostrTools;
        const evento = nt.finishEvent({
            kind: 1,
            created_at: Math.floor(Date.now()/1000),
            tags: [],
            content: text
        }, privKey);

        const ok = await publishToRelays(evento);
        $('contenido').value = '';
        $('charCount').textContent = '280';
        setStatus(`✅ Publicado en ${ok}/${RELAYS.length} relays`, 'ok');

        // Insertar el post propio al tope del feed
        feedPosts.set(evento.id, evento);
        renderFeed();
    } catch(err) {
        setStatus('❌ Error: ' + err.message, 'err');
    } finally {
        $('btnPublicar').disabled = false;
    }
};

// ═══════════════════════════════════════════════════════
//  REFRESCAR
// ═══════════════════════════════════════════════════════
$('btnRefresh').onclick = loadFeed;

// ── Arranque ──
loadFeed();
</script>
