<!DOCTYPE html>
<html>
<head>
    <title>AntiX</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; background: #000; color: #fff; }
        button { background: #ff0055; color: white; padding: 10px; margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; }
        textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; }
        .post { background: #16181c; padding: 10px; margin: 10px 0; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>🔥 AntiX</h1>
    
    <button id="crearCuenta">1. Crear Cuenta</button>
    <div id="claveDiv" style="display:none;">
        <p><strong>GUARDA ESTA CLAVE:</strong></p>
        <textarea id="clavePrivada" rows="2" readonly style="background:#222; color:#0f0;"></textarea>
        <p>Sin ella no podrás recuperar tu cuenta</p>
    </div>

    <hr>
    <textarea id="contenido" rows="3" placeholder="¿Qué piensas?" disabled></textarea>
    <button id="publicar" disabled>Publicar</button>
    <div id="feed"></div>

    <!-- Prueba con CDN de jsDelivr -->
    <script src="https://cdn.jsdelivr.net/npm/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
    
    <script>
        // Verificar que la librería cargó
        if (typeof nostrTools === 'undefined' && typeof window.nostrTools === 'undefined') {
            alert('⚠️ Error: No se pudo cargar la librería. Revisa tu conexión a internet.');
        }

        // Usar nostrTools directamente (sin window)
        const nt = typeof nostrTools !== 'undefined' ? nostrTools : window.nostrTools;
        
        let privKey = '';
        let pubKey = '';

        document.getElementById('crearCuenta').onclick = async function() {
            try {
                if (!nt) throw new Error('Librería no disponible');
                
                privKey = nt.generatePrivateKey();
                pubKey = await nt.getPublicKey(privKey);
                
                document.getElementById('claveDiv').style.display = 'block';
                document.getElementById('clavePrivada').value = privKey;
                document.getElementById('contenido').disabled = false;
                document.getElementById('publicar').disabled = false;
                
                alert('✅ Cuenta creada correctamente');
                cargarFeed();
            } catch(e) {
                alert('Error: ' + e.message);
            }
        };

        document.getElementById('publicar').onclick = async function() {
            if (!privKey) return;
            const contenido = document.getElementById('contenido').value;
            if (!contenido) return;

            const evento = {
                kind: 1,
                pubkey: pubKey,
                created_at: Math.floor(Date.now() / 1000),
                tags: [],
                content: contenido
            };
            
            evento.id = await nt.getEventHash(evento);
            evento.sig = await nt.signEvent(evento, privKey);

            const ws = new WebSocket('wss://relay.damus.io');
            ws.onopen = () => {
                ws.send(JSON.stringify(['EVENT', evento]));
                setTimeout(() => ws.close(), 1000);
            };
            
            document.getElementById('contenido').value = '';
            setTimeout(cargarFeed, 2000);
        };

        async function cargarFeed() {
            const filtro = { kinds: [1], limit: 20 };
            const ws = new WebSocket('wss://relay.damus.io');
            let posts = [];
            
            ws.onopen = () => {
                ws.send(JSON.stringify(['REQ', 'feed', filtro]));
            };
            
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg[0] === 'EVENT' && msg[2]?.kind === 1) {
                    posts.push(msg[2]);
                    posts.sort((a,b) => b.created_at - a.created_at);
                    document.getElementById('feed').innerHTML = posts.map(p => 
                        `<div class="post"><strong>${p.pubkey.slice(0,8)}</strong><p>${p.content}</p></div>`
                    ).join('');
                }
            };
        }

        cargarFeed();
    </script>
</body>
</html>
