<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AntiX · Búsqueda Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #080b0f;
            --surface: #0e1318;
            --border:  #1c2530;
            --accent:  #00d4ff;
            --accent2: #ff3cac;
            --text:    #d8e4f0;
            --muted:   #4a6070;
            --danger:  #ff4560;
            --green:   #00e676;
            --like:    #ff3cac;
            --repost:  #00e676;
            --mono:    'IBM Plex Mono', monospace;
            --sans:    'IBM Plex Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

        .app {
            display: grid;
            grid-template-columns: 220px 1fr 260px;
            grid-template-rows: 54px 1fr;
            min-height: 100vh;
            max-width: 1080px;
            margin: 0 auto;
        }

        .topbar {
            grid-column: 1/-1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 20px; gap: 12px;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: var(--mono); font-weight: 600; font-size: 1.05rem; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--accent2); }
        .logo img { height: 34px; width: 34px; border-radius: 50%; object-fit: cover; }

        .search-area { flex: 1; max-width: 360px; position: relative; margin-left: 16px; }
        .search-input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 40px; padding: 8px 12px 8px 38px;
            font-family: var(--sans); font-size: 0.85rem; color: var(--text);
            outline: none; transition: all 0.2s;
        }
        .search-input:focus { border-color: var(--accent); background: #0a1117; }
        .search-icon { position: absolute; left: 14px; top: 9px; color: var(--muted); font-size: 0.9rem; pointer-events: none; }
        .search-clear { position: absolute; right: 10px; top: 7px; background: none; border: none; color: var(--muted); font-size: 0.9rem; cursor: pointer; display: none; border-radius: 20px; padding: 2px 6px; }
        .search-clear:hover { color: var(--text); background: var(--border); }

        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .pubkey-badge {
            font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
            background: var(--bg); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 20px; cursor: pointer;
        }
        .pubkey-badge:hover { border-color: var(--accent); color: var(--accent); }

        .sidebar-left {
            border-right: 1px solid var(--border);
            padding: 16px 12px; display: flex; flex-direction: column; gap: 4px;
        }
        .nav-btn {
            background: none; border: none; color: var(--muted);
            font-family: var(--sans); font-size: 0.88rem; font-weight: 500;
            padding: 9px 12px; border-radius: 8px; cursor: pointer;
            text-align: left; display: flex; align-items: center; gap: 10px;
            width: 100%;
        }
        .nav-btn:hover { background: var(--border); color: var(--text); }
        .nav-btn.active { background: rgba(0,212,255,0.1); color: var(--accent); }
        .nav-btn .icon { width: 18px; text-align: center; }
        .sidebar-divider {
            margin: 10px 0; padding: 10px 12px 4px;
            border-top: 1px solid var(--border);
            font-family: var(--mono); font-size: 0.62rem;
            color: var(--muted); text-transform: uppercase;
        }
        .side-key { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); padding: 4px 12px; word-break: break-all; }

        .feed-col {
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow-y: auto; max-height: calc(100vh - 54px);
        }
        .feed-header {
            padding: 12px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: var(--bg); z-index: 10;
        }
        .feed-tabs { display: flex; gap: 4px; }
        .feed-tab {
            background: none; border: 1px solid transparent; color: var(--muted);
            font-family: var(--mono); font-size: 0.68rem; padding: 5px 12px;
            border-radius: 20px; cursor: pointer;
        }
        .feed-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

        .search-badge {
            background: rgba(0,212,255,0.15); border: 1px solid var(--accent);
            border-radius: 20px; padding: 4px 12px;
            font-family: var(--mono); font-size: 0.68rem;
            color: var(--accent); display: inline-flex; align-items: center; gap: 8px;
        }
        .search-badge button { background: none; border: none; color: var(--accent); cursor: pointer; }

        .composer {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: none; gap: 12px;
        }
        .composer-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.6rem; font-weight: 600; color: #000; cursor: pointer; background-size: cover !important; background-position: center !important; }
        .composer-body { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        textarea { background: transparent; border: none; color: var(--text); font-family: var(--sans); font-size: 0.92rem; resize: none; outline: none; width: 100%; min-height: 56px; }
        textarea::placeholder { color: var(--muted); }
        
        .media-preview-strip { display: flex; gap: 8px; flex-wrap: wrap; }
        .media-thumb { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; background: #0a0f14; }
        .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .media-thumb .remove-media { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.75); border: none; border-radius: 50%; color: #fff; font-size: 0.65rem; width: 18px; height: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .media-thumb .remove-media:hover { background: var(--danger); }
        .media-thumb .upload-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 3px; z-index: 5; }
        .media-thumb .upload-overlay .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        .media-thumb .upload-overlay span { font-family: var(--mono); font-size: 0.55rem; color: #fff; }
        .media-thumb.done .upload-overlay { display: none; }
        .media-thumb.error { border-color: var(--danger); }
        
        .composer-toolbar { display: flex; align-items: center; gap: 6px; padding-top: 4px; border-top: 1px solid var(--border); }
        .toolbar-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; padding: 5px 10px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
        .toolbar-btn:disabled { opacity: 0.4; cursor: default; }
        .toolbar-btn input[type=file] { display: none; }
        .upload-progress { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); flex: 1; text-align: right; }
        .upload-progress.uploading { color: var(--accent); }
        .upload-progress.error { color: var(--danger); }
        .composer-footer { display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
        .char-count { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
        .char-count.warn { color: #ff9800; }
        .char-count.over { color: var(--danger); }
        
        .btn { font-family: var(--sans); font-size: 0.8rem; font-weight: 600; padding: 7px 16px; border-radius: 20px; border: none; cursor: pointer; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #33ddff; transform: translateY(-1px); }
        .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: default; transform: none; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { font-size: 0.72rem; padding: 5px 12px; }
        
        .status-bar { padding: 7px 18px; font-family: var(--mono); font-size: 0.68rem; color: var(--muted); border-bottom: 1px solid var(--border); min-height: 32px; display: flex; align-items: center; gap: 7px; }
        .status-bar.ok { color: var(--green); }
        .status-bar.err { color: var(--danger); }
        .spinner { display: inline-block; width: 9px; height: 9px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .post { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 11px; transition: background 0.1s; animation: fadeIn 0.25s ease; }
        .post:hover { background: rgba(255,255,255,0.015); }
        .post.is-repost { border-left: 2px solid var(--repost); padding-left: 16px; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; } }
        .post-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.6rem; font-weight: 600; color: #000; cursor: pointer; background-size: cover !important; background-position: center !important; }
        .post-body { flex: 1; min-width: 0; }
        .repost-label { font-family: var(--mono); font-size: 0.62rem; color: var(--repost); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .post-meta { display: flex; align-items: baseline; gap: 7px; margin-bottom: 4px; flex-wrap: wrap; }
        .post-name-info {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .post-name { font-weight: 600; font-size: 0.86rem; cursor: pointer; }
        .post-name:hover { color: var(--accent); }
        .post-followers {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--green);
            background: rgba(0,230,118,0.1);
            padding: 2px 6px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .post-followers:hover {
            background: rgba(0,230,118,0.2);
            transform: scale(1.02);
        }
        .post-pubkey { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }
        .post-time { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); margin-left: auto; }
        .post-content { font-size: 0.88rem; line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
        
        .post-media { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .post-media img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: scale-down;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: block;
            cursor: pointer;
            background: #0a0f14;
        }
        .post-media img:hover { opacity: 0.9; }
        .post-media video {
            width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: block;
            background: #000;
        }
        .media-grid { display: grid; gap: 4px; border-radius: 10px; overflow: hidden; background: #0a0f14; }
        .media-grid.count-2 { grid-template-columns: repeat(2, 1fr); }
        .media-grid.count-3 { grid-template-columns: repeat(2, 1fr); grid-auto-rows: minmax(150px, auto); }
        .media-grid.count-3 .media-grid-item:first-child { grid-column: span 2; }
        .media-grid.count-4 { grid-template-columns: repeat(2, 1fr); }
        .media-grid-item {
            overflow: hidden;
            background: #0a0f14;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }
        .media-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: scale-down;
            cursor: pointer;
        }

        .post-actions { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
        .action-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: var(--sans); font-size: 0.72rem; color: var(--muted); padding: 5px 10px; border-radius: 20px; transition: all 0.15s; }
        .action-btn:hover { background: rgba(255,255,255,0.05); }
        .action-btn.like-btn:hover { color: var(--like); }
        .action-btn.like-btn.liked { color: var(--like); }
        .action-btn.repost-btn:hover { color: var(--repost); }
        .action-btn.repost-btn.reposted { color: var(--repost); }
        .action-btn.follow-btn:hover { color: var(--accent); }
        .action-btn.follow-btn.following { color: var(--green); }
        .action-icon { font-size: 0.9rem; transition: transform 0.15s; }
        .action-count { font-family: var(--mono); font-size: 0.65rem; min-width: 12px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 400px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); }
        .modal-close { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
        .modal-body { overflow-y: auto; padding: 16px; }
        .modal-user { display: flex; align-items: center; gap: 10px; padding: 10px 18px; }
        .modal-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.6rem; font-weight: 600; color: #000; background-size: cover !important; background-position: center !important; }

        .profile-picture-area {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .profile-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-size: cover !important;
            background-position: center !important;
            background: var(--surface);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 1.5rem;
            color: var(--muted);
        }
        .profile-upload-btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .profile-upload-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .profile-upload-btn input {
            display: none;
        }

        .sidebar-right { padding: 14px; overflow-y: auto; max-height: calc(100vh - 54px); display: flex; flex-direction: column; gap: 14px; }
        .widget { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
        .widget-title { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .auth-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 0.7rem; padding: 9px 11px; width: 100%; outline: none; margin-bottom: 7px; }
        .auth-input:focus { border-color: var(--accent); }
        .profile-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 0.8rem; padding: 8px 11px; width: 100%; outline: none; margin-bottom: 10px; }
        .profile-input:focus { border-color: var(--accent); }
        .info-note { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); line-height: 1.6; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        .follow-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
        .follow-item:last-child { border-bottom: none; }
        .follow-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.55rem; font-weight: 600; color: #000; background-size: cover !important; background-position: center !important; }
        .follow-info { flex: 1; min-width: 0; }
        .follow-name { font-size: 0.78rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .follow-key { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); }
        .unfollow-btn { background: none; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 0.62rem; padding: 3px 7px; cursor: pointer; }
        .empty-state { padding: 36px 18px; text-align: center; color: var(--muted); font-size: 0.82rem; font-family: var(--mono); }
        
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 6px; }
        .lightbox-close { position: absolute; top: 18px; right: 22px; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        
        .av0 { background: linear-gradient(135deg,#00d4ff,#0066ff); }
        .av1 { background: linear-gradient(135deg,#ff3cac,#ff6b35); }
        .av2 { background: linear-gradient(135deg,#00e676,#00bcd4); }
        .av3 { background: linear-gradient(135deg,#ffeb3b,#ff5722); }
        .av4 { background: linear-gradient(135deg,#e040fb,#7c4dff); }
        .av5 { background: linear-gradient(135deg,#ff4560,#ff9800); }

        #btnMenuMovil { display: none; }
        @media (max-width: 860px) {
            .app { grid-template-columns: 1fr; }
            .sidebar-left, .sidebar-right { display: none; }
            .feed-col { max-height: none; border-right: none; }
            #btnMenuMovil { display: flex !important; }
            .search-area { max-width: 200px; }
        }
        .post-followers.loading {
            opacity: 0.5;
            background: rgba(0,230,118,0.05);
            cursor: wait;
        }        
    </style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="logo">🔥 Anti<span>X</span><img src="HIy9szhW8AAGLJp.jpg" alt="logo"></div>
        <div class="search-area">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar en todo Nostr...">
            <button class="search-clear" id="searchClearBtn" style="display:none;">✕</button>
        </div>
        <div id="topPubkey" class="pubkey-badge" style="display:none">—</div>
        <div class="topbar-right">
            <button class="btn btn-outline btn-sm" id="btnRefresh">↺ Refrescar</button>
            <button class="btn btn-outline btn-sm" id="btnMenuMovil" onclick="abrirMenuMovil()">⚙️</button>
        </div>
    </header>

    <aside class="sidebar-left">
        <button class="nav-btn active" id="navGlobal" onclick="switchTab('global')"><span class="icon">🌐</span> Global</button>
        <button class="nav-btn" id="navSiguiendo" onclick="switchTab('siguiendo')"><span class="icon">👥</span> Siguiendo</button>
        <div class="sidebar-divider">Tu cuenta</div>
        <div class="side-key" id="sideKey">Sin conectar</div>
        <button class="nav-btn" id="btnEditProfile" onclick="openProfileModal()" style="margin-top:8px;"><span class="icon">✏️</span> Editar perfil</button>
        <button class="nav-btn" id="btnLogout" onclick="logout()" style="margin-top:4px; color: var(--danger);"><span class="icon">🚪</span> Desconectar</button>
    </aside>

    <main class="feed-col">
        <div class="feed-header">
            <div class="feed-tabs">
                <button class="feed-tab active" id="tabGlobal" onclick="switchTab('global')">Global</button>
                <button class="feed-tab" id="tabSiguiendo" onclick="switchTab('siguiendo')">Siguiendo</button>
            </div>
            <span id="postCount"></span>
        </div>

        <div class="composer" id="composer">
            <div class="composer-avatar" id="myAvatar"></div>
            <div class="composer-body">
                <textarea id="contenido" rows="3" placeholder="¿Qué estás pensando?…" maxlength="280"></textarea>
                <div class="media-preview-strip" id="mediaPreviewStrip"></div>
                <div class="composer-toolbar">
                    <button class="toolbar-btn" id="btnAddImage">🖼️ Imagen<input type="file" id="fileImage" accept="image/*" multiple></button>
                    <button class="toolbar-btn" id="btnAddVideo">🎬 Video<input type="file" id="fileVideo" accept="video/*" multiple></button>
                    <span class="upload-progress" id="uploadProgress"></span>
                </div>
                <div class="composer-footer">
                    <span class="char-count" id="charCount">280</span>
                    <button class="btn btn-primary btn-sm" id="btnPublicar" disabled>Publicar</button>
                </div>
            </div>
        </div>

        <div class="status-bar" id="statusBar">Conecta tu cuenta para empezar</div>
        <div id="feed"></div>
    </main>

    <aside class="sidebar-right">
        <div class="widget">
            <div class="widget-title">🔑 Cuenta</div>
            <input class="auth-input" type="password" id="claveInput" placeholder="Clave privada hex (vacío = nueva)">
            <button class="btn btn-primary" style="width:100%" id="btnConectar">Conectar</button>
        </div>

// Función mejorada para cargar seguidores
async function loadFollowersForPubkeys(pubkeys) {
    const missing = pubkeys.filter(pk => !followersCount.has(pk) && !loadingFollowers.has(pk));
    if (!missing.length) return;
    
    // Inicializar con 0 mientras se cargan
    for (const pk of missing) {
        loadingFollowers.add(pk);
        followersCount.set(pk, 0);
    }
    renderFeed(); // Mostrar 0 temporalmente
    
    // Consultar cada pubkey individualmente
    for (const targetPk of missing) {
        let maxCount = 0;
        
        // Probar cada relay
        for (const url of RELAYS) {
            try {
                const ws = await openRelay(url, 3000);
                const subId = 'followers_' + Date.now() + '_' + Math.random();
                const filter = {
                    kinds: [3],
                    '#p': [targetPk],
                    limit: 200
                };
                
                ws.send(JSON.stringify(['REQ', subId, filter]));
                
                let relayCount = 0;
                await new Promise((resolve) => {
                    const timeout = setTimeout(() => { 
                        ws.close(); 
                        resolve(); 
                    }, 3000);
                    
                    ws.onmessage = (e) => {
                        try {
                            const msg = JSON.parse(e.data);
                            if (msg[0] === 'EVENT' && msg[2]) {
                                relayCount++;
                            }
                            if (msg[0] === 'EOSE') {
                                clearTimeout(timeout);
                                ws.close();
                                resolve();
                            }
                        } catch(err) {}
                    };
                    ws.onerror = () => {
                        clearTimeout(timeout);
                        ws.close();
                        resolve();
                    };
                });
                
                maxCount = Math.max(maxCount, relayCount);
            } catch(e) {}
        }
        
        followersCount.set(targetPk, maxCount);
        loadingFollowers.delete(targetPk);
    }
    
    renderFeed(); // Actualizar con los números reales
}

// También añadir una función para obtener seguidores de un solo usuario (más rápido)
async function getSingleUserFollowers(pubkey) {
    if (followersCount.has(pubkey)) return followersCount.get(pubkey);
    
    let maxCount = 0;
    for (const url of RELAYS) {
        try {

            const subId = 'followers_' + Date.now();
            const filter = {
                kinds: [3],

            ws.send(JSON.stringify(['REQ', subId, filter]));
            
            let relayCount = 0;

                ws.onmessage = (e) => {

                ws.onerror = () => { clearTimeout(timeout); ws.close(); resolve(); };

            maxCount = Math.max(maxCount, relayCount);
        } catch(e) {}
    }
    
    followersCount.set(pubkey, maxCount);
    return maxCount;
}
// ─── SEGUIDORES (NIP-45 COUNT + fallback por eventos) ───────────────────
const followersCount   = new Map();   // pk → número
const followersPending = new Set();   // pk esperando resultado

async function loadFollowersBatch(pubkeys) {
    const toLoad = pubkeys.filter(pk => !followersCount.has(pk) && !followersPending.has(pk));
    if (!toLoad.length) return;

    toLoad.forEach(pk => {
        followersPending.add(pk);
        followersCount.set(pk, null);  // null = cargando
    });

    renderFeed();  // muestra spinner/guión mientras carga

    await Promise.all(RELAYS.map(url => queryFollowersFromRelay(url, toLoad)));

    toLoad.forEach(pk => followersPending.delete(pk));
    renderFeed();
}

async function queryFollowersFromRelay(url, pubkeys) {
    let ws;
    try {
        ws = await openRelay(url, 4000);
    } catch(_) { return; }

    const subId  = 'fc_' + Math.random().toString(36).slice(2, 7);
    const counts = new Map(pubkeys.map(pk => [pk, 0]));

    // Intentar NIP-45 COUNT primero
    const supportsCount = await tryNip45Count(ws, subId + '_c', pubkeys, counts);

    if (!supportsCount) {
        // Fallback: descargar eventos y contar manualmente
        await new Promise(resolve => {
            const t = setTimeout(() => resolve(), 5000);

            ws.onmessage = e => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg[0] === 'EVENT' && msg[2]?.kind === 3) {
                        // Este evento kind:3 lista a alguien como contacto
                        // Cada tag p que coincida con nuestros pubkeys suma 1
                        for (const tag of (msg[2].tags || [])) {
                            if (tag[0] === 'p' && counts.has(tag[1])) {
                                counts.set(tag[1], counts.get(tag[1]) + 1);
                            }
                        }
                    }
                    if (msg[0] === 'EOSE') { clearTimeout(t); resolve(); }
                } catch(_) {}
            };
            ws.onerror = () => { clearTimeout(t); resolve(); };

            ws.send(JSON.stringify(['REQ', subId, {
                kinds: [3],
                '#p': pubkeys,
                limit: 500
            }]));
        });
    }

    // Actualizar el mapa global con el máximo entre relays
    for (const [pk, count] of counts) {
        const prev = followersCount.get(pk) ?? 0;
        followersCount.set(pk, Math.max(prev, count));
    }

    try { ws.close(); } catch(_) {}
}

async function tryNip45Count(ws, subId, pubkeys, countsMap) {
    // NIP-45: enviar COUNT en lugar de REQ
    return new Promise(resolve => {
        const t = setTimeout(() => resolve(false), 2000);

        ws.onmessage = e => {
            try {
                const msg = JSON.parse(e.data);
                // Respuesta COUNT: ["COUNT", subId, {"count": N}]
                if (msg[0] === 'COUNT' && msg[1] === subId) {
                    clearTimeout(t);
                    // COUNT global — no por pubkey individual, así que
                    // repartimos uniformemente como estimación
                    const total = msg[2]?.count ?? 0;
                    const perPk = Math.floor(total / pubkeys.length);
                    pubkeys.forEach(pk => countsMap.set(pk, perPk));
                    resolve(true);
                }
                // Si el relay responde NOTICE o CLOSED, no soporta COUNT
                if (msg[0] === 'NOTICE' || msg[0] === 'CLOSED') {
                    clearTimeout(t); resolve(false);
                }
            } catch(_) { clearTimeout(t); resolve(false); }
        };

        try {
            ws.send(JSON.stringify(['COUNT', subId, {
                kinds: [3],
                '#p': pubkeys
            }]));
        } catch(_) { clearTimeout(t); resolve(false); }
    });
}
// ─── En el render, mostrar el número ────────────────────────────────────
function renderFollowerCount(pk) {

}

async function uploadProfilePicture(file) {
    if (!file) return null;
    if (!file.type.startsWith('image/')) {
        alert('Solo se permiten imágenes');
        return null;
    }
    if (file.size > 2 * 1024 * 1024) {
        alert('La imagen es muy grande (máx 2MB).');
        return null;
    }
    
    setStatus('<span class="spinner"></span> Procesando foto...');
    try {
        const compressed = await compressProfileImage(file, 300, 300);
        setStatus('✅ Foto lista', 'ok');
        return compressed;
    } catch (err) {
        alert('Error al procesar la imagen');
        setStatus('❌ Error', 'err');
        return null;
    }
}

function compressProfileImage(file, maxWidth, maxHeight) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const objUrl = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(objUrl);
            let { width: w, height: h } = img;
            if (w > maxWidth || h > maxHeight) {
                if (w >= h) {
                    h = Math.round(h * maxWidth / w);
                    w = maxWidth;
                } else {
                    w = Math.round(w * maxHeight / h);
                    h = maxHeight;
                }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            resolve(dataUrl);
        };
        img.onerror = () => {
            URL.revokeObjectURL(objUrl);
            reject(new Error('No se pudo cargar la imagen'));
        };
        img.src = objUrl;
    });
}

async function saveProfile(name, bio, pictureDataUrl) {

    const profile = {};

    const nt = window.NostrTools;

        kind: 0,
        created_at: Math.floor(Date.now()/1000),
        tags: [],
        content: content
    }, privKey);
    
    setStatus('<span class="spinner"></span> Guardando perfil...');
    const ok = await publishEvent(ev);
    if (ok > 0) {

// ============================================================
async function searchGlobalNostr(query) {
    if (!query.trim()) { exitSearchMode(); return; }
    isSearchMode = true;
    currentSearchQuery = query;
    setStatus(`🔍 Buscando "${query}" en toda la red Nostr...`, '');
    $('feed').innerHTML = `<div class="empty-state"><span class="spinner"></span><br>Buscando...</div>`;
    feedPosts.clear();
    const searchFilter = { kinds: [1], search: query, limit: 100 };
    let totalFound = 0;
    await Promise.all(SEARCH_RELAYS.map(async url => {
        try {
            const ws = await openRelay(url, 5000);
            const subId = 'search_' + Date.now();
            ws.send(JSON.stringify(['REQ', subId, searchFilter]));
            await new Promise((resolve) => {
                const timeout = setTimeout(() => { ws.close(); resolve(); }, 8000);
                ws.onmessage = (e) => {
                    try {
                        const msg = JSON.parse(e.data);
                        if (msg[0] === 'EVENT' && msg[2]) {
                            const ev = msg[2];
                            if (!feedPosts.has(ev.id)) {
                                feedPosts.set(ev.id, ev);
                                totalFound++;
                                setStatus(`🔍 Encontrados ${totalFound} resultados...`, '');
                            }
                        }
                        if (msg[0] === 'EOSE') { clearTimeout(timeout); ws.close(); resolve(); }
                    } catch(err) {}
                };
                ws.onerror = () => { clearTimeout(timeout); ws.close(); resolve(); };
            });
        } catch(e) {}
    }));
    if (feedPosts.size === 0) {
        setStatus(`🔍 No se encontraron resultados`, 'err');
        $('feed').innerHTML = `<div class="empty-state">😔 No hay posts que coincidan con "${esc(query)}"</div>`;
        return;
    }
    setStatus(`✅ ${feedPosts.size} resultados`, 'ok');
    const authors = [...new Set([...feedPosts.values()].map(p => p.pubkey))];
    const postIds = [...feedPosts.keys()];
    await Promise.all([loadProfiles(authors), loadLikes(postIds), loadReposts(postIds)]);
    loadFollowersForPubkeys(authors);
    renderFeed();
}

function exitSearchMode() {
    isSearchMode = false;
    currentSearchQuery = '';
    $('searchInput').value = '';
    $('searchClearBtn').style.display = 'none';
    loadFeed();
}

// ============================================================
//  RELAY HELPERS
// ============================================================
function openRelay(url, timeout=5000) {
    return new Promise((resolve, reject) => {
        try {
            const ws = new WebSocket(url);
            const t = setTimeout(() => reject(new Error('timeout')), timeout);
            ws.onopen = () => { clearTimeout(t); resolve(ws); };
            ws.onerror = () => { clearTimeout(t); reject(); };
        } catch(e) { reject(e); }
    });
}

async function queryRelay(url, filters, onEvent, timeout=7000) {
    let ws;
    try {
        ws = await openRelay(url, 5000);
        const sub = 'sub_' + Math.random().toString(36).slice(2,7);
        ws.send(JSON.stringify(['REQ', sub, ...filters]));
        await new Promise(resolve => {
            const t = setTimeout(resolve, timeout);
            ws.onmessage = e => {
                try {
                    const m = JSON.parse(e.data);
                    if (m[0]==='EVENT' && m[2]) onEvent(m[2]);
                    if (m[0]==='EOSE') { clearTimeout(t); resolve(); }
                } catch(_) {}
            };
            ws.onerror = () => { clearTimeout(t); resolve(); };
        });
    } catch(_) {}
    try { ws?.close(); } catch(_) {}
}

async function publishEvent(event) {
    let ok = 0;
    await Promise.all(RELAYS.map(async url => {
        try {
            const ws = await openRelay(url, 5000);
            ws.send(JSON.stringify(['EVENT', event]));
            await new Promise(r => setTimeout(r, 900));
            ws.close();
            ok++;
        } catch(_) {}
    }));
    return ok;
}

// ============================================================
const MAX_IMG_BYTES = 800 * 1024;
const MAX_DIM = 1200;

function fileToDataURL(file) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = () => reject(new Error('No se pudo leer el archivo'));
        r.readAsDataURL(file);
    });
}

function compressImage(file, maxDim, maxBytes) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const objUrl = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(objUrl);
            let { width: w, height: h } = img;
            if (w > maxDim || h > maxDim) {
                if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
                else { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            let quality = 0.85;
            const tryEncode = () => {
                const dataUrl = canvas.toDataURL('image/jpeg', quality);
                const bytes = Math.round((dataUrl.length - 'data:image/jpeg;base64,'.length) * 3/4);
                if (bytes <= maxBytes || quality <= 0.3) resolve(dataUrl);
                else { quality = Math.max(0.3, quality - 0.12); tryEncode(); }
            };
            tryEncode();
        };
        img.onerror = () => { URL.revokeObjectURL(objUrl); reject(new Error('No se pudo cargar la imagen')); };
        img.src = objUrl;
    });
}

async function uploadMedia(file) {
    const isVideo = file.type.startsWith('video/');
    if (isVideo) {
        const services = [
            async () => {
                const fd = new FormData();
                fd.append('fileToUpload', file);
                const res = await fetch('https://nostr.build/api/v2/upload/files', { method:'POST', body:fd, mode:'cors' });
                const json = await res.json();
                const url = json?.data?.[0]?.url;
                if (!url) throw new Error();
                return url;
            },
            async () => {
                const fd = new FormData();
                fd.append('reqtype', 'fileupload');
                fd.append('fileToUpload', file);
                const res = await fetch('https://catbox.moe/user.php', { method:'POST', body:fd, mode:'cors' });
                const text = await res.text();
                if (!text.startsWith('https://')) throw new Error();
                return text.trim();
            }
        ];
        for (const service of services) {
            try {
                const url = await service();
                return { dataUrl: url, isExternal: true };
            } catch(e) { continue; }
        }
        throw new Error('VIDEO_CORS');
    } else {
        let dataUrl;
        if (file.size > MAX_IMG_BYTES || file.type === 'image/bmp') {
            dataUrl = await compressImage(file, MAX_DIM, MAX_IMG_BYTES);
        } else {
            dataUrl = await fileToDataURL(file);
            const bytes = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 3/4);
            if (bytes > MAX_IMG_BYTES) dataUrl = await compressImage(file, MAX_DIM, MAX_IMG_BYTES);
        }
        return { dataUrl, isExternal: false };
    }
}

}

function setUploadProgress(msg, type='') {
    const el = $('uploadProgress');
    el.textContent = msg;
    el.className = 'upload-progress ' + type;
}

function renderMediaPreviews() {
    const strip = $('mediaPreviewStrip');
    strip.innerHTML = '';
    pendingMedia.forEach((m, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'media-thumb' + (m.remoteUrl ? ' done' : '') + (m.error ? ' error' : '');
        if (m.type === 'video') {
            const vid = document.createElement('video');
            vid.src = m.localUrl;
            vid.muted = true;
            thumb.appendChild(vid);
        } else {
            const img = document.createElement('img');
            img.src = m.localUrl;
            thumb.appendChild(img);
        }
        if (!m.remoteUrl && !m.error) {
            const ov = document.createElement('div');
            ov.className = 'upload-overlay';
            ov.innerHTML = `<div class="spinner"></div><span>subiendo…</span>`;
            thumb.appendChild(ov);
        }
        if (m.error) {
            const ov = document.createElement('div');
            ov.className = 'upload-overlay';
            ov.innerHTML = `<span>⚠️ error</span>`;
            thumb.appendChild(ov);
        }
        const rm = document.createElement('button');
        rm.className = 'remove-media';
        rm.innerHTML = '✕';
        rm.onclick = () => removeMedia(i);
        thumb.appendChild(rm);
        strip.appendChild(thumb);
    });
    updatePublishBtn();
}

function removeMedia(index) {
    URL.revokeObjectURL(pendingMedia[index]?.localUrl);
    pendingMedia.splice(index, 1);
    renderMediaPreviews();
    if (!pendingMedia.length) setUploadProgress('');
}

async function handleFiles(files) {
    for (const file of files) {
        const isVideo = file.type.startsWith('video/');
        if (!isVideo && file.size > 10 * 1024 * 1024) {
            alert('"' + file.name + '" es demasiado grande. Max ~10 MB.');
            continue;
        }
        const localUrl = URL.createObjectURL(file);
        const entry = { localUrl, remoteUrl: null, type: isVideo ? 'video' : 'image', uploading: true, error: false };
        pendingMedia.push(entry);
        renderMediaPreviews();
        setUploadProgress(isVideo ? 'Subiendo video...' : 'Procesando imagen...', 'uploading');
        try {
            const result = await uploadMedia(file);
            entry.remoteUrl = result.dataUrl;
            entry.uploading = false;
        } catch (err) {
            entry.error = true;
            entry.uploading = false;
            setUploadProgress('Error', 'error');
        }
        renderMediaPreviews();
    }
}

async function loadProfiles(pubkeys) {
    const missing = [...new Set(pubkeys)].filter(pk => !profiles.has(pk));
    if (!missing.length) return;
    await Promise.all(RELAYS.map(url => queryRelay(url, [{ kinds:[0], authors: missing }], ev => {
        if (ev.kind===0 && !profiles.has(ev.pubkey)) {
            try { profiles.set(ev.pubkey, JSON.parse(ev.content)); } catch(_) {}
        }
    }, 4000)));
}

async function loadFollows() {
    if (!pubKey) return;
    follows.clear();
    await Promise.all(RELAYS.map(url => queryRelay(url, [{ kinds:[3], authors:[pubKey] }], ev => {
        if (ev.kind===3 && ev.pubkey===pubKey) ev.tags.filter(t=>t[0]==='p').forEach(t=>follows.add(t[1]));
    }, 4000)));
    renderFollowsList();
}

async function publishFollows() {
    const nt = window.NostrTools;
    const ev = nt.finishEvent({ kind:3, created_at: Math.floor(Date.now()/1000), tags: [...follows].map(pk=>['p',pk]), content: '' }, privKey);
    await publishEvent(ev);
}

async function followUser(pk) {
    if (!privKey || follows.has(pk) || pk===pubKey) return;
    follows.add(pk);
    await publishFollows();
    renderFollowsList();
    if (!isSearchMode) loadFeed();
}

async function unfollowUser(pk) {
    if (!privKey) return;
    follows.delete(pk);
    await publishFollows();
    renderFollowsList();
    if (!isSearchMode) loadFeed();
}

function renderFollowsList() {
    $('followCount').textContent = follows.size;
    $('widgetFollows').style.display = follows.size ? 'block' : 'none';
    $('followsList').innerHTML = [...follows].map(pk => {

        const avatarContent = p?.picture ? '' : avInitials(pk);
        return `<div class="follow-item">
            <div ${avatarStyle}>${avatarContent}</div>

            </div>

        </div>`;
    }).join('');
}

async function loadLikes(postIds) {
    if (!postIds.length) return;
    await Promise.all(RELAYS.map(url => queryRelay(url, [{ kinds:[7], '#e': postIds, limit: 500 }], ev => {
        if (ev.kind!==7) return;
        const eTag = ev.tags.find(t=>t[0]==='e');
        if (eTag) {
            const pid = eTag[1];
            if (!likes.has(pid)) likes.set(pid, new Set());
            likes.get(pid).add(ev.pubkey);
            if (pubKey && ev.pubkey===pubKey) myLikes.add(pid);
        }
    }, 5000)));
}

async function loadReposts(postIds) {
    if (!postIds.length) return;
    await Promise.all(RELAYS.map(url => queryRelay(url, [{ kinds:[6], '#e': postIds, limit: 300 }], ev => {
        if (ev.kind!==6) return;
        const eTag = ev.tags.find(t=>t[0]==='e');
        if (eTag) {
            const pid = eTag[1];
            if (!reposts.has(pid)) reposts.set(pid, new Set());
            reposts.get(pid).add(ev.pubkey);
            if (pubKey && ev.pubkey===pubKey) myReposts.add(pid);
        }
    }, 5000)));
}

async function repostPost(postId) {

function extractMediaUrls(text) {
    const dataImages = [...text.matchAll(/(data:image\/[a-z+]+;base64,[A-Za-z0-9+/=]+)/g)].map(m => m[1]);
    const images = [...text.matchAll(IMAGE_RE)].map(m => m[1]);
    const videos = [...text.matchAll(VIDEO_RE)].map(m => m[1]);
    const youtubes = [...text.matchAll(YOUTUBE_RE)].map(m => m[1]);
    return { images: [...dataImages, ...images], videos, youtubes };
}

function stripMediaUrls(text) {
    return text.replace(/(data:image\/[a-z+]+;base64,[A-Za-z0-9+/=]+)/g, '').replace(YOUTUBE_RE, '').replace(IMAGE_RE, '').replace(VIDEO_RE, '').trim();
}

function buildMediaHtml(images, videos, youtubes = []) {
    if (!images.length && !videos.length && !youtubes.length) return '';
    let html = '<div class="post-media">';
    youtubes.forEach(id => { html += `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;"><iframe src="https://www.youtube.com/embed/${id}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>`; });
    videos.forEach(url => { html += `<video src="${esc(url)}" controls preload="metadata" playsinline></video>`; });
    if (images.length === 1) {
        html += `<img src="${esc(images[0])}" onclick="openLightbox('${esc(images[0])}')">`;
    } else if (images.length > 1) {
        const count = Math.min(images.length, 4);
        html += `<div class="media-grid count-${count}">`;
        images.slice(0,4).forEach(url => { html += `<div class="media-grid-item"><img src="${esc(url)}" onclick="openLightbox('${esc(url)}')"></div>`; });
        if (images.length > 4) html += `<div>+${images.length-4} más</div>`;
        html += '</div>';
    }
    html += '</div>';
    return html;
}

function buildActions(post) {
    const id = post.id;
    const isMe = post.pubkey === pubKey;
    const isFollowing = follows.has(post.pubkey);
    const liked = myLikes.has(id);
    const reposted = myReposts.has(id);
    const likeCount = likes.get(id)?.size || 0;
    const repostCount = reposts.get(id)?.size || 0;
    return `
        <button class="action-btn like-btn ${liked?'liked':''}" onclick="likePost('${id}')">
            <span class="action-icon">${liked?'❤️':'🤍'}</span>
            <span class="action-count">${likeCount || ''}</span>
        </button>
        ${likeCount ? `<button class="action-btn" onclick="showLikes('${id}')" style="color:var(--like)">Ver likes</button>` : ''}
        <button class="action-btn repost-btn ${reposted?'reposted':''}" onclick="repostPost('${id}')">
            <span class="action-icon">🔁</span>
            <span class="action-count">${repostCount || ''}</span>
        </button>
        ${privKey && !isMe ? (isFollowing ? `<button class="action-btn follow-btn following" onclick="unfollowUser('${post.pubkey}')">✓ Siguiendo</button>` : `<button class="action-btn follow-btn" onclick="followUser('${post.pubkey}')">+ Seguir</button>`) : ''}
    `;
}

function renderPost(post, isRepostOf) {
    const id = post.id;
    const p = profiles.get(post.pubkey) || {};
    const ac = avClass(post.pubkey);
    const initials = avInitials(post.pubkey);
    const name = esc(displayName(post.pubkey));
    const ago = timeAgo(post.created_at);
    const followerCount = followersCount.get(post.pubkey) || 0;
    
    let avatarHtml = '';
    if (p.picture) {
        avatarHtml = `<div class="post-avatar" style="background: url(${p.picture}) center/cover no-repeat; background-size: cover; width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;"></div>`;
    } else {
        avatarHtml = `<div class="post-avatar ${ac}" style="display: flex; align-items: center; justify-content: center; flex-shrink: 0;">${initials}</div>`;
    }
    
    const { images, videos, youtubes } = extractMediaUrls(post.content);
    const textContent = esc(stripMediaUrls(post.content));
    const mediaHtml = buildMediaHtml(images, videos, youtubes);
    const repostLabel = isRepostOf ? `<div class="repost-label">🔁 Reposteado por ${esc(displayName(isRepostOf))}</div>` : '';
    const followersTooltip = followerCount > 0 ? `${followerCount} seguidor${followerCount !== 1 ? 'es' : ''}` : 'Sin seguidores aún';
    
    return `<div class="post ${isRepostOf?'is-repost':''}" data-post-id="${id}">
        ${avatarHtml}
        <div class="post-body">
            ${repostLabel}
            <div class="post-meta">
                <div class="post-name-info">
                    <span class="post-name">${name}</span>
                    ${followerCount > 0 ? `<span class="post-followers" title="${followersTooltip}">👥 ${formatNumber(followerCount)}</span>` : ''}
                </div>
                <span class="post-pubkey">${post.pubkey.slice(0,8)}…</span>
                <span class="post-time">${ago}</span>
            </div>
            <div class="post-content">${textContent}</div>
            ${mediaHtml}
            <div class="post-actions">${buildActions(post)}</div>
        </div>
    </div>`;
}

function renderFeed() {
    let posts = [...feedPosts.values()];
    if (!isSearchMode && currentTab === 'siguiendo') {
        posts = posts.filter(p => follows.has(p.pubkey) || p.pubkey === pubKey);
    }
    posts.sort((a,b) => b.created_at - a.created_at);
    if (isSearchMode) {
        $('postCount').innerHTML = `<span class="search-badge">🔍 ${posts.length} resultados <button onclick="exitSearchMode()">✕</button></span>`;
    } else {
        $('postCount').innerHTML = `${posts.length} posts`;
    }
    if (!posts.length) {
        $('feed').innerHTML = `<div class="empty-state">${isSearchMode ? 'No hay resultados' : (currentTab==='siguiendo' ? 'Aún no sigues a nadie.' : 'Sin posts.')}</div>`;
        return;
    }
    $('feed').innerHTML = posts.map(p => renderPost(p)).join('');
}

async function loadFeed() {

    setStatus('<span class="spinner"></span> Cargando feed...');
    feedPosts.clear();

    const filter = currentTab === 'global' 
        ? { kinds:[1], limit: 40 }
        : { kinds:[1], authors: [...(pubKey?[pubKey]:[]), ...follows], limit: 60 };

    await Promise.all(RELAYS.map(url =>
        queryRelay(url, [filter], ev => {
            if (ev.kind===1) feedPosts.set(ev.id, ev);
        }, 7000)
    ));

    const postIds = [...feedPosts.keys()];
    const authors = [...new Set([...feedPosts.values()].map(p=>p.pubkey))];
    const authors = [...new Set([...feedPosts.values()].map(p => p.pubkey))];
    await Promise.all([
        loadProfiles(authors),
        loadLikes(postIds),
        loadReposts(postIds),
        loadFollowersBatch(authors)   // ← agregar esta línea

        $('searchClearBtn').style.display = 'block';
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchGlobalNostr(query), 800);
    } else {
        $('searchClearBtn').style.display = 'none';
        if (isSearchMode) exitSearchMode();
    }
});
$('searchClearBtn').addEventListener('click', () => { $('searchInput').value = ''; $('searchClearBtn').style.display = 'none'; exitSearchMode(); });

async function autoConnect() {
    const savedKey = loadSavedPrivateKey();
    if (savedKey) {
        $('claveInput').value = savedKey;
        $('claveInputMovil').value = savedKey;
        await conectar(savedKey);
    } else {
        loadFeed();
    }
}

autoConnect();
</script>
